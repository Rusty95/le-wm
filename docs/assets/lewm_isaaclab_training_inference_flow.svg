<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">LeWM IsaacLab training and inference flow</title>
  <desc id="desc">Animated flow diagram showing offline data collection and LeWM training, followed by online IsaacLab inference with a latent policy head.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="58%" stop-color="#eef5f6"/>
      <stop offset="100%" stop-color="#f7efe7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #10202a; }
      .subtitle { font: 400 16px Arial, Helvetica, sans-serif; fill: #52616f; }
      .lane-title { font: 700 18px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .label { font: 700 17px Arial, Helvetica, sans-serif; fill: #10202a; }
      .small { font: 400 13px Arial, Helvetica, sans-serif; fill: #536372; }
      .tiny { font: 700 12px Arial, Helvetica, sans-serif; fill: #f8fafc; }
      .box { rx: 14; fill: #ffffff; stroke: #d6dee7; stroke-width: 1.3; filter: url(#shadow); }
      .train { stroke: #4f8f95; }
      .infer { stroke: #d88746; }
      .flow { fill: none; stroke: #475569; stroke-width: 2.4; marker-end: url(#arrow); }
      .soft-flow { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .token-blue { fill: #168aad; }
      .token-green { fill: #4f8f95; }
      .token-orange { fill: #d88746; }
      .token-red { fill: #c2410c; }
      .pulse { transform-origin: center; animation: pulse 2s ease-in-out infinite; }
      .box-glow { animation: glow 8s ease-in-out infinite; }
      @keyframes pulse {
        0%, 100% { opacity: 0.45; r: 5; }
        50% { opacity: 1; r: 8; }
      }
      @keyframes glow {
        0%, 100% { stroke-width: 1.3; }
        50% { stroke-width: 2.5; }
      }
    </style>
  </defs>

  <rect width="1200" height="560" fill="url(#bg)"/>
  <text x="60" y="58" class="title">LeWM + IsaacLab Cartpole</text>
  <text x="62" y="84" class="subtitle">Offline world-model learning, then online control with frozen LeWM latents and a lightweight policy head.</text>

  <rect x="44" y="118" width="1112" height="172" rx="24" fill="#ffffff" opacity="0.62" stroke="#d6dee7"/>
  <text x="64" y="150" class="lane-title">1. Training pipeline</text>

  <rect x="72" y="178" width="165" height="76" class="box train box-glow"/>
  <text x="94" y="208" class="label">IsaacLab</text>
  <text x="94" y="231" class="small">RGB camera rollouts</text>

  <rect x="288" y="178" width="155" height="76" class="box train"/>
  <text x="315" y="208" class="label">HDF5 data</text>
  <text x="315" y="231" class="small">pixels, actions</text>

  <rect x="494" y="178" width="155" height="76" class="box train"/>
  <text x="529" y="208" class="label">LeWM</text>
  <text x="515" y="231" class="small">multi-step H10</text>

  <rect x="700" y="178" width="178" height="76" class="box train"/>
  <text x="723" y="208" class="label">Latent head</text>
  <text x="725" y="231" class="small">3 latents -> action</text>

  <rect x="929" y="178" width="174" height="76" class="box train"/>
  <text x="959" y="208" class="label">Artifacts</text>
  <text x="950" y="231" class="small">checkpoint + head</text>

  <path id="trainPath1" d="M237 216 C252 216 270 216 288 216" class="flow"/>
  <path id="trainPath2" d="M443 216 C459 216 477 216 494 216" class="flow"/>
  <path id="trainPath3" d="M649 216 C665 216 683 216 700 216" class="flow"/>
  <path id="trainPath4" d="M878 216 C895 216 912 216 929 216" class="flow"/>

  <circle r="7" class="token-blue">
    <animateMotion dur="2.6s" repeatCount="indefinite" begin="0s">
      <mpath href="#trainPath1"/>
    </animateMotion>
  </circle>
  <circle r="7" class="token-green">
    <animateMotion dur="2.6s" repeatCount="indefinite" begin="0.55s">
      <mpath href="#trainPath2"/>
    </animateMotion>
  </circle>
  <circle r="7" class="token-green">
    <animateMotion dur="2.6s" repeatCount="indefinite" begin="1.1s">
      <mpath href="#trainPath3"/>
    </animateMotion>
  </circle>
  <circle r="7" class="token-orange">
    <animateMotion dur="2.6s" repeatCount="indefinite" begin="1.65s">
      <mpath href="#trainPath4"/>
    </animateMotion>
  </circle>

  <rect x="44" y="322" width="1112" height="178" rx="24" fill="#ffffff" opacity="0.62" stroke="#d6dee7"/>
  <text x="64" y="354" class="lane-title">2. Online inference pipeline</text>

  <rect x="72" y="386" width="165" height="76" class="box infer box-glow"/>
  <text x="94" y="416" class="label">IsaacLab</text>
  <text x="92" y="439" class="small">current camera frame</text>

  <rect x="288" y="386" width="155" height="76" class="box infer"/>
  <text x="318" y="416" class="label">Encoder</text>
  <text x="313" y="439" class="small">pixels -> latent</text>

  <rect x="494" y="386" width="155" height="76" class="box infer"/>
  <text x="518" y="416" class="label">History</text>
  <text x="515" y="439" class="small">last 3 latents</text>

  <rect x="700" y="386" width="178" height="76" class="box infer"/>
  <text x="735" y="416" class="label">Policy head</text>
  <text x="735" y="439" class="small">latent -> action</text>

  <rect x="929" y="386" width="174" height="76" class="box infer box-glow"/>
  <text x="972" y="416" class="label">Action</text>
  <text x="950" y="439" class="small">control cartpole</text>

  <path id="inferPath1" d="M237 424 C252 424 270 424 288 424" class="flow"/>
  <path id="inferPath2" d="M443 424 C459 424 477 424 494 424" class="flow"/>
  <path id="inferPath3" d="M649 424 C665 424 683 424 700 424" class="flow"/>
  <path id="inferPath4" d="M878 424 C895 424 912 424 929 424" class="flow"/>
  <path id="feedbackPath" d="M1016 462 C1016 526 154 526 154 462" class="soft-flow"/>

  <circle r="7" class="token-blue">
    <animateMotion dur="2.3s" repeatCount="indefinite" begin="0s">
      <mpath href="#inferPath1"/>
    </animateMotion>
  </circle>
  <circle r="7" class="token-green">
    <animateMotion dur="2.3s" repeatCount="indefinite" begin="0.45s">
      <mpath href="#inferPath2"/>
    </animateMotion>
  </circle>
  <circle r="7" class="token-orange">
    <animateMotion dur="2.3s" repeatCount="indefinite" begin="0.9s">
      <mpath href="#inferPath3"/>
    </animateMotion>
  </circle>
  <circle r="7" class="token-red">
    <animateMotion dur="2.3s" repeatCount="indefinite" begin="1.35s">
      <mpath href="#inferPath4"/>
    </animateMotion>
  </circle>
  <circle r="5" class="token-orange" opacity="0.8">
    <animateMotion dur="4.8s" repeatCount="indefinite" begin="1.8s">
      <mpath href="#feedbackPath"/>
    </animateMotion>
  </circle>

  <rect x="66" y="106" width="98" height="24" rx="12" fill="#4f8f95"/>
  <text x="83" y="123" class="tiny">OFFLINE</text>
  <rect x="66" y="310" width="86" height="24" rx="12" fill="#d88746"/>
  <text x="84" y="327" class="tiny">ONLINE</text>

  <circle cx="1090" cy="72" r="7" class="token-blue pulse"/>
  <circle cx="1118" cy="72" r="7" class="token-green pulse"/>
  <circle cx="1146" cy="72" r="7" class="token-orange pulse"/>
  <text x="958" y="78" class="small">animated data flow</text>
</svg>
